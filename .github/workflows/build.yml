name: Build Executables

on:
  push:
    branches:
      - master
      - main
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    env:
      VERSION: 'latest'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Extract App Version
        id: get_version
        shell: bash
        run: |
          python -c "import re; m = re.search(r'APP_VERSION\s*=\s*\"([^\"]+)\"', open('src/gui.py', encoding='utf-8').read()); print(f\"VERSION={m.group(1)}\")" >> $GITHUB_ENV

      - name: Build executable
        shell: bash
        run: |
          cd src
          python -c "import PyInstaller.__main__; import os; PyInstaller.__main__.run(['--noconfirm', '--onefile', '--windowed', f'--add-data=assets{os.pathsep}assets', '--hidden-import', 'core_downloader', '--hidden-import', 'telethon', '--name', f'TGDownloader-v{os.environ[\"VERSION\"]}-${{ runner.os }}', 'gui.py'])"
          cd ..

      - name: Rename Executable (Windows)
        if: runner.os == 'Windows'
        run: |
          cd src/dist
          Rename-Item -Path "TGDownloader-v${{ env.VERSION }}-${{ runner.os }}.exe" -NewName "TGDownloader-v${{ env.VERSION }}-Windows.exe"

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: TGDownloader-v${{ env.VERSION }}-${{ runner.os }}
          path: src/dist/TGDownloader-v${{ env.VERSION }}-*
