name: Build Executables

on:
  push:
    branches:
      - master
      - main
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build executable
        run: |
          python -c "import PyInstaller.__main__; import os; PyInstaller.__main__.run(['--noconfirm', '--onedir', '--windowed', '--paths', 'src', f'--add-data=src/assets{os.pathsep}assets', '--hidden-import', 'core_downloader', '--hidden-import', 'telethon', '--name', 'TGDownloader', 'src/gui.py'])"

      - name: Prepare Artifact (Unix)
        if: runner.os != 'Windows'
        run: |
          cd dist
          zip -r "TGDownloader-${{ runner.os }}.zip" TGDownloader*

      - name: Prepare Artifact (Windows)
        if: runner.os == 'Windows'
        run: |
          cd dist
          Compress-Archive -Path TGDownloader* -DestinationPath "TGDownloader-${{ runner.os }}.zip"

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: tgdownloader-${{ runner.os }}
          path: dist/TGDownloader-${{ runner.os }}.zip
