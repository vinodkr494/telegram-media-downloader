name: Build Executables

on:
  push:
    branches:
      - master
      - main
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    env:
      VERSION: 'latest'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller
          if [ "${{ runner.os }}" == "macOS" ]; then
            pip install dmgbuild
          fi

      - name: Extract App Version
        id: get_version
        shell: bash
        run: |
          python -c "import re; m = re.search(r'APP_VERSION\s*=\s*\"([^\"]+)\"', open('src/gui.py', encoding='utf-8').read()); print(f\"VERSION={m.group(1)}\")" >> $GITHUB_ENV

      - name: Build executable
        shell: bash
        run: |
          cd src
          if [ "${{ runner.os }}" == "macOS" ]; then
            # Build .app bundle for macOS
            # Note: We don't use --onefile for macOS .app bundles to ensure compatibility
            python -m PyInstaller --noconfirm --windowed --noconsole \
              --add-data "assets:assets" \
              --icon "assets/logo.ico" \
              --hidden-import "core_downloader" \
              --hidden-import "telethon" \
              --name "TGDownloader" \
              gui.py
            cd ..
            # Create DMG
            export APP_NAME="TGDownloader.app"
            dmgbuild -s dmg_settings.py "TG Media Downloader" "src/dist/TGDownloader-v${{ env.VERSION }}-macOS.dmg"
          else
            # Windows/Linux (onefile binary)
            python -c "import PyInstaller.__main__; import os; PyInstaller.__main__.run(['--noconfirm', '--onefile', '--windowed', f'--add-data=assets{os.pathsep}assets', '--icon=assets/logo.ico', '--hidden-import', 'core_downloader', '--hidden-import', 'telethon', '--name', f'TGDownloader-v{os.environ[\"VERSION\"]}-${{ runner.os }}', 'gui.py'])"
            cd ..
          fi

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: TGDownloader-v${{ env.VERSION }}-${{ runner.os }}
          path: |
            src/dist/TGDownloader-v${{ env.VERSION }}-*
          if-no-files-found: warn

      - name: Publish to GitHub Releases
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            src/dist/TGDownloader-v${{ env.VERSION }}-*
          name: TG Media Downloader v${{ env.VERSION }}
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
